<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login - H4B F.C.</title>
    <link rel="stylesheet" href="styleLogin.css" />
  </head>

  <body>
    <header>
      <div class="logo-wrapper">
        <a href="/home.html">
          <img src="/midia/logo.png" alt="Logo" class="logo-img" />
        </a>
        <div class="logo-text">
          <strong>H4B</strong
          ><span style="color: var(--rosa)">FootBall Club</span>
        </div>
      </div>
    </header>

    <div class="login-container">
      <h1>Login</h1>

      <form id="form-login">
        <label>Email</label>
        <input
          type="email"
          id="email-login"
          placeholder="Digite seu email"
          required
        />
        <label>Senha</label>
        <input
          type="password"
          id="senha-login"
          placeholder="Digite sua senha"
          required
        />
        <button type="submit">Entrar</button>
        <a href="cadastro.html" class="register-btn">Criar Conta</a>
      </form>
    </div>

    <footer>2024 H4B FC. Todos os direitos reservados.</footer>
    <script src="config.js"></script>
    <script src="login.js"></script>
  </body>
</html>
